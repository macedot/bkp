name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            asset: bkp-linux-amd64
            archive: bkp-linux-amd64.tar.gz
            exe: bkp
          - os: ubuntu-24.04-arm
            target: linux-arm64
            asset: bkp-linux-arm64
            archive: bkp-linux-arm64.tar.gz
            exe: bkp
          - os: macos-14
            target: darwin-arm64
            asset: bkp-darwin-arm64
            archive: bkp-darwin-arm64.tar.gz
            exe: bkp
          - os: windows-latest
            target: windows-amd64
            asset: bkp-windows-amd64.exe
            archive: bkp-windows-amd64.zip
            exe: bkp.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: latest

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          make OUT="${{ matrix.exe }}"
          test -x "${{ matrix.exe }}"
          mkdir -p dist
          cp "${{ matrix.exe }}" "dist/${{ matrix.asset }}"
          # Smoke: no args prints usage, exit 2
          set +e
          "./${{ matrix.exe }}" >/dev/null 2>&1
          code=$?
          set -e
          test "$code" -eq 2
          tar -czf "dist/${{ matrix.archive }}" -C dist "${{ matrix.asset }}"

      - name: Enable MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if not exist build mkdir build
          if not exist dist mkdir dist

          cmake -S vendor/zstd/build/cmake -B build/zstd-cmake -DZSTD_BUILD_PROGRAMS=OFF -DZSTD_BUILD_TESTS=OFF -DZSTD_BUILD_SHARED=OFF -DZSTD_BUILD_STATIC=ON -DZSTD_MULTITHREAD_SUPPORT=ON -DCMAKE_BUILD_TYPE=Release
          if errorlevel 1 exit /b 1
          cmake --build build/zstd-cmake --config Release --parallel
          if errorlevel 1 exit /b 1

          rem CMake MSVC output path
          set ZSTD_LIB=build\zstd-cmake\lib\Release\zstd_static.lib
          if not exist "%ZSTD_LIB%" set ZSTD_LIB=build\zstd-cmake\lib\zstd_static.lib
          if not exist "%ZSTD_LIB%" (
            echo ERROR: zstd_static.lib not found
            dir /s /b build\zstd-cmake\*.lib
            exit /b 1
          )
          echo Using %ZSTD_LIB%

          cl /nologo /O2 /Ivendor /Ivendor/zstd/lib /c vendor\bkp_zstd_wrap.c /Fobuild\bkp_zstd_wrap.obj
          if errorlevel 1 exit /b 1
          lib /nologo /OUT:build\bkpzstd.lib build\bkp_zstd_wrap.obj %ZSTD_LIB%
          if errorlevel 1 exit /b 1

          odin build src -out:bkp.exe -o:speed
          if errorlevel 1 exit /b 1
          copy /Y bkp.exe dist\bkp-windows-amd64.exe
          if errorlevel 1 exit /b 1
          powershell -NoProfile -Command "Compress-Archive -Path 'dist\\bkp-windows-amd64.exe' -DestinationPath 'dist\\${{ matrix.archive }}' -Force"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
